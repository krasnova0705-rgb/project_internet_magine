<!DOCTYPE html>
<html lang="ru">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="header-container"></header>

<main>

            <h1>Новая коллекция</h1>
            <p>Минимализм. Качество. Стиль.</p>
            <a href="./catalog.html" class="btn-primary">Смотреть каталог</a>

    <section class="section-new">
        <h2>Новинки</h2>
        <div class="products-grid" id="new-arrivals"></div>

    <section class="section-reviews">

        <div id="reviews-error" class="error-message" style="display:none"></div>
        <div class="reviews-grid" id="reviews-container"></div>

<footer id="footer-container"></footer>
