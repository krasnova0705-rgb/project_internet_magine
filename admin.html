<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
  
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; background: #f9f9f9; }
        .hidden { display: none !important; }
        .admin-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #productForm input, #productForm select, #productForm textarea {
            display: block; width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px;
        }
        .form-buttons { display: flex; gap: 10px; }
        .form-buttons button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-submit { background: #28a745; color: white; }
        .btn-cancel { background: #6c757d; color: white; }
        
        .admin-product-item { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; background: white; }
        .btn-edit { background: #ffc107; color: black; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; margin-right: 5px; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>🛠 Админ-панель магазина</h1>
        <a href="index.html">← Вернуться в магазин</a>
    </header>

    <main id="adminContainer">
      
     
        <section id="adminDashboard" class="admin-section">
            <h2>Управление товарами</h2>
            
            <div class="product-form-container">
                <h3 id="formTitle">Добавить новый товар</h3>
                <form id="productForm">
                    <input type="hidden" id="editProductId" value="">
                    
                    <input type="text" id="productName" placeholder="Название товара" required>
                    <input type="number" id="productPrice" placeholder="Цена" required min="0.01" step="0.01">
                    
                    <select id="productCategory" required>
                        <option value="">Выберите категорию</option>
                        <option value="tshirts">Футболки</option>
                        <option value="trousers">Брюки</option>       
                        <option value="shirts">Рубашки</option>
                        <option value="blazers">Пиджаки</option>      
                        <option value="polo">Поло</option>
                        <option value="belts">Ремни</option>
                    </select>
                    
                    <input type="number" id="productDiscount" placeholder="Скидка в %" value="0" min="0" max="99">
                    <input type="text" id="productImage" placeholder="Ссылка на картинку (URL)">
                    <textarea id="productDescription" placeholder="Описание товара" rows="3"></textarea>
                    
                    <div class="checkbox-group" style="margin: 15px 0;">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="productIsNew" style="width: auto; margin: 0;">
                            <span>Новинка (показывать в разделе "Новинки")</span>
                        </label>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" id="formSubmitBtn" class="btn-submit">Добавить</button>
                        <button type="button" id="cancelEditBtn" class="btn-cancel hidden">Отмена</button>
                    </div>
                </form>
            </div>

            <div class="products-list-container" style="margin-top: 30px;">
                <h3>Список всех товаров</h3>
                <div id="allProductsList">
                    <p>Загрузка товаров...</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
